<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NorthGate Visa Application Form</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .form-container { background: #ffffff; max-width: 800px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid #003366; margin-top: 20px; margin-bottom: 40px; }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 180px; height: auto; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .header h2 { color: #003366; margin: 0; font-size: 24px; text-transform: uppercase; }
        .header p { color: #666; margin: 5px 0 0; font-size: 14px; }
        .section-title { background: #f8f9fa; color: #003366; padding: 12px 15px; border-radius: 5px; font-size: 18px; font-weight: bold; margin: 30px 0 15px 0; border-left: 5px solid #003366; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #333; text-align: left; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: 1 / -1; }
        .declaration-box { margin-top: 30px; padding: 20px; background: #fff9e6; border-radius: 8px; font-size: 14px; display: flex; align-items: flex-start; gap: 12px; text-align: left; }
        .submit-btn { width: 100%; padding: 18px; background-color: #003366; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s ease; }
        .submit-btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .modal-box { background: white; margin: 15% auto; padding: 40px; border-radius: 15px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .success-icon { font-size: 60px; color: #25D366; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="logo-container"><img src="logo.png" alt="NorthGate Logo"></div>
    <div class="header">
        <h2>NorthGate Visa Service Center</h2>
        <p><strong>U.S VISA APPLICANT INFORMATION FORM</strong></p>
    </div>

    <form id="visaForm">
        <div class="section-title">👤 Applicant Details</div>
        <div class="grid">
            <div class="input-group"><label>Full Name *</label><input type="text" name="full_name" id="full_name" required></div>
            <div class="input-group"><label>Father’s / Husband’s Name *</label><input type="text" name="father_name" id="father_name" required></div>
            <div class="input-group"><label>Date of Birth *</label><input type="date" name="dob" id="dob" required></div>
            <div class="input-group"><label>CNIC / Passport No *</label><input type="text" name="passport" id="passport" required></div>
            <div class="input-group"><label>Contact Number *</label><input type="text" name="contact" id="contact" required></div>
            <div class="input-group"><label>Email Address *</label><input type="email" name="email_id" id="email_id" required></div>
        </div>

        <div class="section-title">✈️ Travel Information</div>
        <div class="grid">
            <div class="input-group"><label>Purpose of Travel *</label>
                <select name="purpose" id="purpose" required>
                    <option value="">Select</option>
                    <option value="Visit">Visit/Tourist/Pleasure</option>
                    <option value="Student">Student</option>
                    <option value="Work">Work</option>
                    <option value="Business">Business Meeting</option>
                </select>
            </div>
            <div class="input-group"><label>Intended Travel Date</label><input type="date" name="travel_date" id="travel_date"></div>
            <div class="input-group"><label>Duration of Stay</label><input type="text" name="duration" id="duration" placeholder="e.g. 15 Days"></div>
            <div class="input-group"><label>Intended City/State in USA</label><input type="text" name="usa_city" id="usa_city"></div>
        </div>

        <div class="section-title">🌍 Travel History</div>
        <div class="grid">
            <div class="input-group"><label>Travelled Internationally Before?</label>
                <select name="intl_travel" id="intl_travel">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>
            </div>
            <div class="input-group"><label>Countries Visited</label><input type="text" name="countries_visited" id="countries_visited"></div>
            <div class="input-group full-width"><label>Previous U.S. Visa (if any)</label><input type="text" name="prev_visa" id="prev_visa"></div>
        </div>

        <div class="section-title">👨‍👩‍👧 Family Information</div>
        <div class="grid">
            <div class="input-group"><label>Marital Status</label>
                <select name="marital_status" id="marital_status">
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Divorced">Divorced</option>
                </select>
            </div>
            <div class="input-group"><label>Spouse Name</label><input type="text" name="spouse_name" id="spouse_name"></div>
            <div class="input-group full-width"><label>Children Details</label><textarea name="children_details" id="children_details" rows="2"></textarea></div>
        </div>

        <div class="section-title">💼 Employment Details</div>
        <div class="grid">
            <div class="input-group"><label>Occupation</label><input type="text" name="occupation" id="occupation"></div>
            <div class="input-group"><label>Monthly Income</label><input type="text" name="income" id="income"></div>
        </div>

        <div class="declaration-box">
            <input type="checkbox" id="agree" required>
            <label for="agree">I hereby declare that all information is true.</label>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">SUBMIT APPLICATION</button>
    </form>
</div>

<div id="thankYouModal" class="modal-overlay">
    <div class="modal-box">
        <div class="success-icon">✔</div>
        <h2 style="color:#003366;">Submitted!</h2>
        <p>Your details have been saved successfully.</p>
        <button class="submit-btn" onclick="window.location.reload()">Fill New Form</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzTpAhhgJZxuXVT6IUzF7hG-bFET8_zaOpK6jdnuwp9hek9kSl1wcp1H7g_b1lW1VE-VQ/exec';
    const form = document.getElementById('visaForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Sending... Please Wait";

        // URL parameters tayyar karna
        const params = new URLSearchParams(new FormData(form)).toString();

        // GET method use karna (Is se error nahi aata)
        fetch(scriptURL + "?" + params, { method: 'GET', mode: 'no-cors' })
        .then(() => {
            document.getElementById('thankYouModal').style.display = 'block';
            form.reset();
        })
        .catch(() => {
            // Localhost par error aa sakta hai, lekin data chala jayega
            document.getElementById('thankYouModal').style.display = 'block';
        });
    });
</script>

</body>
</html>
